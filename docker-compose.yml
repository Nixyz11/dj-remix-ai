version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
      - ./models:/app/models
    environment:
      - HF_HOME=/app/models
      - DEVICE=cpu
    deploy:
      resources:
        limits:
          memory: 8G

  # Redis for Celery task queue (Phase 2)
